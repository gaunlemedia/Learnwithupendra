<h2>What is a Tense?</h2>

<p>
A tense shows the time of an action.
<br><br>

<b>नेपाली:</b><br>
Tense भनेको कुनै काम कहिले भएको, भइरहेको वा हुने हो भन्ने जनाउने व्याकरण हो।
</p>

<h3>Types of Tenses</h3>

<ul>
<li>Present Tense</li>
<li>Past Tense</li>
<li>Future Tense</li>
</ul>
